name: Fetch Instagram Followers
on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 15 * * *"  # 毎日 00:30 JST（例）
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run collector
        env:
          FB_USER_TOKEN_LONG: ${{ secrets.FB_USER_TOKEN_LONG }}
          PAGE_IDS: ${{ secrets.PAGE_IDS }}
          INSTAGRAM_USER_IDS: ${{ secrets.INSTAGRAM_USER_IDS }}
        run: |
          node tools/fetch_followers.mjs
      - name: Commit data changes
+        uses: stefanzweifel/git-auto-commit-action@v5
+        with:
+          commit_message: "chore(data): update Instagram followers snapshot"
+          file_pattern: data/**
