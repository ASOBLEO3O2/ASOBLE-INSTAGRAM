name: Fetch Instagram Followers
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 * * * *"    # 毎時00分（UTC基準）→ JSTで毎時09分台に保存時刻を +09:00 で記録
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run collector (scrape public profiles)
        run: |
         node tools/fetch_followers.mjs
      - name: Debug changed files
        run: |
          echo "=== git status ==="
          git status --porcelain
          echo "=== git diff (names) ==="
          git diff --name-only
          echo "=== git show (first 20 lines of a timeseries) ==="
          git show :data/timeseries/asoble_kitakyushu.json | head -n 20 || true
          echo "=== timeseries listing ==="
          ls -l data/timeseries || true
          echo "=== latest summary/history timestamps ==="
          ls -l data/summary || true
          ls -l data/history || true
      - name: Commit data changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(data): update Instagram followers snapshot"
          file_pattern: data/**
          push_options: '--force'
